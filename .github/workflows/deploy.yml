name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          NEXT_PUBLIC_SITE_URL: https://specrf.pages.dev

      - name: Check build output
        run: |
          echo "=== Root ===" && ls -la
          echo "=== out/ ===" && ls -la out/ || echo "NO out/ DIR"

      - name: Deploy to Cloudflare Pages
        run: npx wrangler pages deploy out --project-name specrf --commit-dirty=true
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

  ping-search-engines:
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule'
    steps:
      - name: Ping Yandex
        run: curl -s "https://webmaster.yandex.ru/ping?sitemap=https://specrf.pages.dev/api/sitemap" || true
      - name: Ping Google
        run: curl -s "https://www.google.com/ping?sitemap=https://specrf.pages.dev/api/sitemap" || true
      - name: Health check
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://specrf.pages.dev/)
          echo "Site status: $STATUS"
